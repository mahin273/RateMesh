global
    log stdout format raw local0

defaults
    log     global
    mode    http
    timeout connect 5s
    timeout client  50s
    timeout server  50s

frontend http_front
    bind *:80
    default_backend gateway_nodes

backend gateway_nodes
    balance roundrobin
    server gateway-1 gateway-1:8080 check
    server gateway-2 gateway-2:8080 check
